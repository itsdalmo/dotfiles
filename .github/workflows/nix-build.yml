name: Nix build

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            target: "dalmo@amd64-linux"
          - runner: ubuntu-24.04-arm
            target: "dalmo@arm64-linux"
          - runner: macos-26
            target: "dalmo@arm64-darwin"
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with: { determinate: false }
      - name: Build Home Manager config
        run: nix build .#homeConfigurations."${{ matrix.target }}".activationPackage --option builders ""
