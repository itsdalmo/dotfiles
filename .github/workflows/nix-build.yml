name: Nix build

on:
  pull_request:
    branches:
      - master
    paths:
      - "**/*.nix"
      - "flake.nix"
      - "flake.lock"

permissions: {}

jobs:
  build:
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - runner: ubuntu-24.04
            target: "dalmo@amd64-linux"
          - runner: ubuntu-24.04-arm
            target: "dalmo@arm64-linux"
          - runner: macos-26
            target: "dalmo@arm64-darwin"
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22
        with: { determinate: false }
      - name: Build Home Manager config
        run: nix build .#homeConfigurations."${{ matrix.target }}".activationPackage --option builders ""
